<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#020204">
  <meta name="description" content="Once a year, the entire world sings the same song at the exact same time.">
  <title>World Choir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/world-choir-theme.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  <canvas id="earth-canvas" aria-hidden="true"></canvas>
  <div class="ambient-bg" id="ambient-bg"></div>

  <main class="home-page" id="home-page">
    <div id="home-content" class="fade-in"></div>
  </main>

  <!-- Pledge modal only — Promise is NEVER a modal -->
  <div class="overlay" id="pledge-overlay">
    <div class="modal" role="dialog" aria-labelledby="pledge-title">
      <h2 class="modal-title" id="pledge-title">Make Your Voice Part of the World</h2>
      <p class="modal-copy">On July 1, 2027, millions of people will sing the same song at the exact same time. Add your voice to the map.</p>

      <div class="form-group">
        <label class="form-label" for="pledge-name">Your name</label>
        <input class="form-input" id="pledge-name" type="text" placeholder="How should we call you?" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="pledge-city">City</label>
        <input class="form-input" id="pledge-city" type="text" placeholder="Your city" autocomplete="address-level2">
      </div>
      <div class="form-group">
        <label class="form-label" for="pledge-country">Country</label>
        <input class="form-input" id="pledge-country" type="text" placeholder="Your country" autocomplete="country-name">
      </div>

      <p class="form-label">Why are you singing? <span style="text-transform:none;letter-spacing:0;color:var(--text-muted)">(optional)</span></p>
      <div class="reason-grid">
        <button type="button" class="reason-chip" data-reason="Hope">Hope</button>
        <button type="button" class="reason-chip" data-reason="Peace">Peace</button>
        <button type="button" class="reason-chip" data-reason="Love">Love</button>
        <button type="button" class="reason-chip" data-reason="Family">Family</button>
        <button type="button" class="reason-chip" data-reason="Music">Music</button>
        <button type="button" class="reason-chip" data-reason="Humanity">Humanity</button>
        <button type="button" class="reason-chip" data-reason="Mental Health">Mental Health</button>
        <button type="button" class="reason-chip" data-reason="Other">Other</button>
      </div>

      <div class="actions-row">
        <button class="btn btn-primary" id="pledge-submit" type="button">I'll Sing</button>
        <button class="btn btn-secondary" id="pledge-cancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <div id="nav-root"></div>

  <script src="js/world-choir-config.js"></script>
  <script src="js/world-choir-db.js"></script>
  <script src="js/world-choir-nav.js"></script>
  <script src="js/world-choir-home.js"></script>
  <script>WorldChoirHome.init();</script>
</body>
</html>
