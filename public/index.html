<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#020204">
  <meta name="description" content="Once a year, the entire world sings the same song at the exact same time.">
  <title>World Choir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/world-choir-theme.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  <canvas id="earth-canvas" aria-hidden="true"></canvas>
  <div class="ambient-bg" id="ambient-bg"></div>

  <main class="home-page home-page--centered" id="home-page">
    <div id="home-content" class="fade-in"></div>
  </main>

  <!-- Participation location modal — no GPS -->
  <div class="overlay" id="participation-overlay">
    <div class="modal" role="dialog" aria-labelledby="participation-title">
      <h2 class="modal-title" id="participation-title">Where will you sing from?</h2>
      <p class="modal-copy">Choose the city and country where you plan to join World Choir. You can change this later in your profile.</p>

      <div class="form-group">
        <label class="form-label" for="pledge-country">Country</label>
        <select class="form-input form-select" id="pledge-country">
          <option value="">Select country</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="pledge-city">City</label>
        <input class="form-input" id="pledge-city" type="text" placeholder="Your city" autocomplete="address-level2">
      </div>

      <div class="actions-row">
        <button class="btn btn-primary" id="participation-confirm" type="button">Confirm Participation</button>
        <button class="btn btn-secondary" id="participation-cancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Reminder modal -->
  <div class="overlay" id="remind-overlay">
    <div class="modal" role="dialog" aria-labelledby="remind-title">
      <h2 class="modal-title" id="remind-title">Remind Me</h2>
      <p class="modal-copy">We'll notify you before the world sings together.</p>

      <div class="remind-options">
        <label class="remind-option">
          <input type="checkbox" id="remind-1d" checked>
          <span>1 day before</span>
        </label>
        <label class="remind-option">
          <input type="checkbox" id="remind-1h" checked>
          <span>1 hour before</span>
        </label>
        <label class="remind-option">
          <input type="checkbox" id="remind-10m" checked>
          <span>10 minutes before</span>
        </label>
      </div>

      <div class="actions-row">
        <button class="btn btn-primary" id="remind-save" type="button">Save Reminders</button>
        <button class="btn btn-secondary" id="remind-cancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <div id="nav-root"></div>

  <script src="js/world-choir-config.js"></script>
  <script src="js/world-choir-db.js"></script>
  <script src="js/world-choir-nav.js"></script>
  <script src="js/world-choir-home.js"></script>
  <script>WorldChoirHome.init();</script>
</body>
</html>
