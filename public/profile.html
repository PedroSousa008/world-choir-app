<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Your World Choir identity — who you are, where you sing, and how you prepare.">
  <title>World Choir — Profile</title>
  <link rel="icon" type="image/png" href="images/world-choir-logo.png?v=20270706">
  <link rel="apple-touch-icon" href="images/world-choir-logo.png?v=20270706">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/world-choir-theme.css?v=20270706a">
  <link rel="stylesheet" href="css/profile.css?v=20270706a">
</head>
<body>
  <div class="ambient-bg"></div>

  <main class="page profile-page">
    <div class="profile-brand">
      <img class="profile-logo" src="images/world-choir-logo.png?v=20270706" alt="World Choir App" width="1024" height="1024" decoding="async">
      <p class="tagline">Your voice in the global choir</p>
    </div>

    <div id="profile-identity-root"></div>
    <div id="profile-participation-root"></div>
    <div id="profile-practice-root"></div>
    <div id="profile-promise-root"></div>
    <div id="profile-history-root"></div>
    <div id="profile-invite-root"></div>
  </main>

  <!-- Change participation location modal — manual city/country, no GPS -->
  <div class="overlay" id="change-location-overlay">
    <div class="modal" role="dialog" aria-labelledby="location-modal-title">
      <h2 class="modal-title" id="location-modal-title">Change Participation Location</h2>
      <p class="modal-copy" id="location-modal-copy">
        Update where you will sing from. Your light on the map will move to your new city.
      </p>

      <div class="form-group">
        <label class="form-label" for="location-country">Country</label>
        <select class="form-input form-select" id="location-country">
          <option value="">Select country</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="location-city">City</label>
        <input class="form-input" id="location-city" type="text" placeholder="Your city" autocomplete="address-level2">
      </div>

      <div class="actions-row">
        <button class="btn btn-primary" id="location-confirm" type="button">Save Location</button>
        <button class="btn btn-secondary" id="location-cancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Practice Mode — full screen -->
  <div class="practice-mode" id="practice-mode" aria-hidden="true">
    <div id="practice-mode-content"></div>
    <div id="practice-controls"></div>
  </div>

  <div id="nav-root"></div>

  <script src="js/world-choir-config.js"></script>
  <script src="js/world-choir-db.js"></script>
  <script src="js/world-choir-participation.js"></script>
  <script src="js/world-choir-practice-config.js"></script>
  <script src="js/world-choir-nav.js"></script>
  <script src="js/profile/change-location-modal.js"></script>
  <script src="js/profile/user-identity-card.js"></script>
  <script src="js/profile/participation-status-card.js"></script>
  <script src="js/profile/practice-song-button.js"></script>
  <script src="js/profile/practice-countdown.js"></script>
  <script src="js/profile/lyrics-display.js"></script>
  <script src="js/profile/practice-complete-screen.js"></script>
  <script src="js/profile/practice-mode.js"></script>
  <script src="js/profile/promise-card.js"></script>
  <script src="js/profile/world-choir-history.js"></script>
  <script src="js/profile/invite-button.js"></script>
  <script src="js/profile/profile-page.js"></script>
  <script>
    ProfilePage.init();
  </script>
</body>
</html>
